# ============================================================
# market-tools — homespace artifact registry
#
# 投资 / 财经类 domain(investment 为首批)用的轻量底座工具。
# 设计原则:
#   - 零 python 依赖(bash + curl),不用 venv / pip
#   - 免费数据源(Sina + Stooq),不锁 API key
#   - 快照型(非历史型):适合日常观察 + 研究场景
# ============================================================

name: market-tools
domain: code

description: >
  Zero-dep shell scripts wrapping free public market-data APIs
  (Sina Finance for A-shares / HK, Stooq for US). Designed as the
  investment domain's base_imports floor — snapshot quotes always
  available without API keys or Python deps.

artifacts:

  - kind: script
    name: quote
    cmd: bash /home/emox/work/projects/market-tools/quote.sh
    hint: >
      Snapshot quote for a ticker. Auto-routes: `sh######`/`sz######`/
      `hk######`/`bj######` → Sina Finance; `AAPL`/`TSLA`/`*.us` → Stooq.
      Output: 1 line summary `TICKER | price=... open=... high=... low=...
      vol=... ts=...` + 1 raw line for parsing. Example invocation:
      `bash /home/emox/work/projects/market-tools/quote.sh sh600519`
    description: >
      Primary cross-exchange quote entry point. A-shares / HK / US.
      Snapshot only, delayed ~15min during market hours.

  - kind: doc
    name: overview
    path: /home/emox/work/projects/market-tools/README.md
    summary: >
      market-tools is the investment domain's shell-based market-data
      floor: zero-dep (bash + curl), free-tier public APIs (Sina for
      A-shares / HK, Stooq for US), snapshot-only quotes with ~15min
      delay. Currently ships `quote` (ticker → price+OHLC+volume);
      future scripts may add FX, historical OHLCV (tushare/akshare),
      and a typed MCP wrapper. No API keys, no pip deps — safe to
      import from any finance-adjacent domain without setup cost.
