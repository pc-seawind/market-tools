# ============================================================
# market-tools — homespace artifact registry
#
# 投资 / 财经类 domain(investment 为首批)用的轻量底座工具。
# 设计原则:
#   - 优先零 python 依赖,能用 bash + curl 就不引 python
#   - tushare 分支只用 python3 stdlib(urllib),不需 `pip install`
#   - 快照免 key(Sina / Stooq),历史 / 基本面需 TUSHARE_TOKEN
#   - 高层脚本(quote / history)做 ticker 自动路由; tushare.py 是
#     逃生舱,任意 Pro API 都能直调
# ============================================================

name: market-tools
domain: code

description: >
  Market-data utility scripts for the investment domain. Two tiers: (1)
  zero-dep snapshot quotes via Sina/Stooq (no auth), (2) historical &
  fundamental data via tushare Pro (TUSHARE_TOKEN, python3 stdlib only,
  no pip). Ticker shapes are unified across scripts: sh/sz/hk/bj prefix
  for CN/HK, bare symbol for US (quote only).

artifacts:

  - kind: script
    name: backtest
    cmd: bash /home/emox/work/projects/market-tools/backtest.sh
    hint: >
      信号历史回测工具. 每次修改 signals.py 的规则后跑 backtest 验证
      是否真的 predict 了后续走势, 避免"凭感觉写规则". 对每只 ticker 做
      sliding window, 对每个历史交易日算 signals + forward returns
      (+5d / +10d / +20d), 最后输出统计: 平均收益 + 正收益占比 + 信号有效性判断.
      Args: `<ticker1> [ticker2 ...] [--days=180] [--signal=TYPE]`.
      Example: `bash /home/emox/work/projects/market-tools/backtest.sh
       sh688256 sh688041 sz301308 --days=240`
    description: >
      Signal validator for signals.py. 投研里最重要的工具之一 —— 避免
      信号规则成为 noise 的最后防线. 发现 BUY_PULLBACK 和 SELL_BREAKDOWN
      在纯技术层面无效后, 两个信号已在 signals.py 里移除.

  - kind: script
    name: daily
    cmd: bash /home/emox/work/projects/market-tools/daily.sh
    hint: >
      每日监控简报: 持仓健康度 + 信号触发 + 主题轮动 + 美股隔夜 +
      政策信号 + 观察清单. 读取 watchlist_data.py (手工维护的持仓 +
      观察清单) 自动扫描并输出 actionable 简报. 信号自动触发:
      🚨 STOP_LOSS (基础仓 -15% / 博弈仓 -10%), ✅ TAKE_PROFIT
      (基础仓 +50% / 博弈仓 +30%), ⚠️ REDUCE (1W >+15% 末期加速),
      💡 ADD (基础仓回调 -8% 可加仓). Modes: default (全简报),
      --holdings-only (仅持仓+信号, 最快), --alerts (仅触发警报),
      --themes (仅主题轮动). Example:
      `bash /home/emox/work/projects/market-tools/daily.sh --holdings-only`
    description: >
      Daily portfolio monitor. Automates the "每天盯盘" task: reads
      your holdings from watchlist_data.py, fetches today's market
      data, detects signals (stop-loss / take-profit / reduce / add),
      and renders a concise brief. Run every morning before open.

  - kind: script
    name: momentum
    cmd: bash /home/emox/work/projects/market-tools/momentum.sh
    hint: >
      博弈仓筛选器 (与 funnel.sh 对偶). funnel 是保守派 (过滤末期加速),
      momentum 主动追"已在趋势中 + 放量 + 接近高位"的强势股. 但保留
      硬风控底线 (非亏损 PE>0 / 回撤 <30% / --deep 模式检测产业资本
      减持). 关键输出: 每只股票明确交易纪律 (买入区间 ±3% / 止损 -10%
      / 减仓信号 1W > +15% / 目标价 +20~+40%). Args: `[--deep]`
      (加产业资本检测), `[--final=N]` (默认 10), `[--preset=balanced|
      aggressive|contrarian]`. balanced 右侧追涨 (1M ≥+20% / 1W ≥0),
      aggressive 放宽, contrarian 左侧博弈 (短期回调 1W ≤ +3% 但中
      长期强势). Examples:
      `bash /home/emox/work/projects/market-tools/momentum.sh --final=8`
      `bash /home/emox/work/projects/market-tools/momentum.sh
       --preset=contrarian  # 左侧回调博弈`
    description: >
      Momentum / speculative stock picker. Pairs with funnel.sh for
      full portfolio logic: funnel (60-70% 基础仓) + momentum balanced
      (10-15% 右侧追涨) + momentum contrarian (5-10% 左侧博弈). Each
      pick ships with explicit trading discipline (stop loss / reduce
      signal / target).

  - kind: script
    name: funnel
    cmd: bash /home/emox/work/projects/market-tools/funnel.sh
    hint: >
      多轮漏斗式选股流程 (5500 → 300 → 80 → 25 → 8). 对比 screen.sh
      的单轮阈值筛选, funnel 是渐进多轮, 每轮启用不同因子 + **资金
      动向提前到 Round 2** (替代传统的涨幅排序), 避免漏过"估值低位 +
      机构悄悄建仓"的 deep value 标的. Rounds: (1) 流动性 + 市值 + 排除
      ST/新股 → 300 只; (2) 资金动向 smart-money 代理 (成交放量 + 量价
      配合 + 避免暴涨暴跌) → ~80 只; (3) 基本面 + 估值 → ~25 只; (4) 主题
      一致性 (concepts 池 + 活跃行业) → ~8 只. Args: `[--deep]`
      (Round 2 加 per-stock 北向变化, 慢 2-3 min), `[--final=N]`
      (最终收敛个数, 默认 8), `[--round1=N]` (Round 1 上限, 默认 300),
      `[--preset=balanced|value|growth]`, `[--group-by=concept|industry]`.
      Quick mode <30s. Example:
      `bash /home/emox/work/projects/market-tools/funnel.sh --preset=value
       --final=10`
    description: >
      Multi-round progressive stock-selection funnel. Fixes screen.sh's
      "single-round threshold" blind spot — resonance with deep value
      ideas. Feeds directly into compare.sh / diligence.sh via auto-generated
      command snippets at the end.

  - kind: script
    name: concepts
    cmd: bash /home/emox/work/projects/market-tools/concepts.sh
    hint: >
      主题概念板块热度排名 + 龙头发现. 解决 "申万行业分类太传统, 抓
      不到存储/CoWoS/HBM/算力租赁/英伟达链/人形机器人等真正市场主题"
      的问题. 因 tushare 概念 API (ths_index/dc_index/kpl_concept) 需
      付费, 采用手工维护概念池 (concepts_data.py, 14 个热点主题 × 5-10
      只龙头) + 已有 daily 批量 API 本地聚合的 hybrid 方案. 3 种 mode:
      `concepts.sh` 默认全部概念热度排名;
      `concepts.sh --topic=AI芯片` 查某概念成分股明细 (支持模糊匹配);
      `concepts.sh --compare-top=4` 自动挑 top 概念龙头跑 compare.sh;
      `concepts.sh --list` 列出可用概念. 只需 3 API calls (全市场 daily
      × 3 日期), <15s.
    description: >
      Concept-theme hotness ranker. Fills the blind spot申万 L1-L3 can't
      cover (存储/HBM/CoWoS/算力租赁/英伟达链 etc.). Concept pool is
      hand-maintained in concepts_data.py; update it as market themes
      evolve (~every 1-3 months). Best paired with compare.sh via
      `--compare-top=N` one-shot call.

  - kind: script
    name: compare
    cmd: bash /home/emox/work/projects/market-tools/compare.sh
    hint: >
      side-by-side 多股横向对比 (2-5 只). 投研里最常见的动作是 "A 和 B
      哪个值得买" — 之前要跑两次 diligence 人脑拼, 现在一条命令输出
      4 维度对比表: §1 估值 (PE/PB/PS/股息/市值), §2 业绩 (ROE/
      营收净利 YoY/毛利净利率/负债率), §3 量价 (120 天位置/回撤/波动/
      1W-3M 收益), §4 机构动作 (北向/公募/外资 QoQ Δpp). 仅 A 股
      (sh/sz/bj prefix); 每只股 ~5 API calls, 共 5N calls. Example:
      `bash /home/emox/work/projects/market-tools/compare.sh
       sh688256 sh688041 sh688981  # 寒武纪/海光/中芯`
    description: >
      Multi-stock side-by-side comparator. Best paired with screen.sh
      (筛出 top N, 对比最有价值的几只) or used alone for direct
      peer-analysis ("同赛道谁更值得买").

  - kind: script
    name: screen
    cmd: bash /home/emox/work/projects/market-tools/screen.sh
    hint: >
      条件筛股 discovery 工具。对比 diligence/fundamentals/flows 这些
      "ticker → 分析" 的反向流程, screen 填补 "条件 → 候选" 的 discovery
      gap。Stage 1 使用 daily_basic + daily 全市场批量数据做 估值/市值/
      流动性/动能 的 AND-combined filter (~5 API calls, <15s). Filters:
      --pe-max --pe-min --pb-max --ps-max --dv-min --mv-min --mv-max
      --amt-min --tor-min --r1w-min --r1m-min --r1m-max --r3m-min
      --r3m-max --exclude-st. Sort/display: --top=N --sort=KEY (r1m|r3m|
      pe|pb|dv|mv|amt, 前缀 - 表升序). Examples:
      `bash /home/emox/work/projects/market-tools/screen.sh --pe-max=15
       --dv-min=3 --mv-min=200  # 低估红利`
      `bash /home/emox/work/projects/market-tools/screen.sh --r1m-min=20
       --mv-min=500 --amt-min=10  # 成长爆发`
    description: >
      Stock screener (discovery). Pairs with diligence.sh — use screen
      to find candidates, then diligence.sh to analyze each. Stage 1
      (valuation/mv/liquidity/momentum) only; ROE/北向 etc. via Stage 2
      (TODO, or call diligence.sh on each candidate).

  - kind: script
    name: diligence
    cmd: bash /home/emox/work/projects/market-tools/diligence.sh
    hint: >
      ONE-SHOT 六维度 diligence report. Runs quote + history-stats +
      fundamentals + flows + policy in a single unified pass. Output
      ends with pre-filled search queries for the agent/user to run
      out-of-band (search_baidu / search_tavily / fetch_url — those live
      outside this script). Args: `<ticker> [quarters=6]`. A-share gets
      full §1-§5; HK gets §1+§4+§5; US gets §1+§5 only. Runtime ~3-4 min
      for A-share (policy.sh is the rate-limited slow leg). Example:
      `bash /home/emox/work/projects/market-tools/diligence.sh sz300308`
    description: >
      Top-level entry point for comprehensive stock diligence. Instead of
      running quote/history/fundamentals/flows/policy separately, call this
      once and get everything in one report. Use at start of any "should I
      look at XYZ stock?" workflow.

  - kind: script
    name: quote
    cmd: bash /home/emox/work/projects/market-tools/quote.sh
    hint: >
      Snapshot quote for a ticker. Auto-routes: `sh######`/`sz######`/
      `bj######` → Sina Finance; `hk######` → Xueqiu when `XUEQIU_COOKIE`
      is present, otherwise Sina; `AAPL`/`TSLA`/`*.us` → Xueqiu when
      `XUEQIU_COOKIE` is present, otherwise Yahoo/Stooq fallback.
      Output: 1 line summary `TICKER | price=... open=... high=... low=...
      vol=... ts=...` + 1 raw line for parsing. Example:
      `bash /home/emox/work/projects/market-tools/quote.sh sh600519`
    description: >
      Primary cross-exchange quote entry point. A-shares / HK / US.
      Snapshot only, delayed depending on source. Xueqiu is read-only and
      optional; public fallbacks still work without it.

  - kind: script
    name: history
    cmd: bash /home/emox/work/projects/market-tools/history.sh
    hint: >
      Daily OHLCV history for a ticker via tushare Pro. Auto-routes by
      prefix: sh/sz/bj → `daily`, hk → `hk_daily`. Args: `<ticker>
      [days=60] [adj=none]`. Output: CSV with header
      `trade_date,open,high,low,close,vol,amount`, newest row first.
      Requires TUSHARE_TOKEN env var. Example:
      `bash /home/emox/work/projects/market-tools/history.sh sh600519 days=120`
    description: >
      Historical OHLCV fetcher. A-share + HK supported on tushare free
      tier. adj=qfq|hfq not yet implemented — all prices unadjusted.

  - kind: script
    name: fundamentals
    cmd: bash /home/emox/work/projects/market-tools/fundamentals.sh
    hint: >
      One-stop A-share fundamentals snapshot: combines `daily_basic`
      (PE/PB/股息率/市值), `fina_indicator` (ROE/ROA/营收利润增速/
      毛利率/净利率/资产负债率, 最近 N 期) and `forecast` (业绩预告)
      into a human-readable report. A-shares only (sh/sz/bj prefix);
      HK & US are not covered by `fina_indicator` on tushare free tier.
      Args: `<ticker> [quarters=8]`. Example:
      `bash /home/emox/work/projects/market-tools/fundamentals.sh sh688256`
    description: >
      Unified fundamentals report for A-shares. Reads 3 tushare APIs,
      renders a single report — faster than wiring daily_basic +
      fina_indicator + forecast by hand. Use for pre-trade diligence.

  - kind: script
    name: flows
    cmd: bash /home/emox/work/projects/market-tools/flows.sh
    hint: >
      机构资金动作分析(A 股)。组合 top10_floatholders (前十大流通股东
      按季度归档,QoQ 对比) 和 moneyflow_hsgt (北向资金大盘环境)。对判断
      "抱团是否瓦解 / 谁在买 / 谁在卖"至关重要 —— 机构季度持股变化
      往往先于消息面出现。Args: `<ticker> [quarters=4]`. Example:
      `bash /home/emox/work/projects/market-tools/flows.sh sz300308 quarters=6`
    description: >
      Institutional flow scanner. Categorizes top10 股东 into 北向/公募/
      外资/险资/社保/产业资本/自然人,computes QoQ deltas, and surfaces
      clear buy/sell signals. Also shows last 20 days of 北向 aggregate
      flows as market-environment context. A-share only.

  - kind: script
    name: policy
    cmd: bash /home/emox/work/projects/market-tools/policy.sh
    hint: >
      CCTV 新闻联播 抓取 + 关键词过滤,提取政策风向信号。联播中出现
      的产业/技术/政策方向几乎 100% 会成为后续资金主线或监管重点,是
      成本最低的"官方信号"来源。Args: `[days=7] [--grep=关键词1|关键词2]
      [--all]`. Default filter strips diplomatic/ceremonial noise. Example:
      `bash /home/emox/work/projects/market-tools/policy.sh days=14
       --grep='半导体|AI|算力|芯片|基础研究'`
    description: >
      Policy-signal scanner. Pulls CCTV 新闻联播 headlines via tushare
      `cctv_news` over a date range, filters by regex (default: strips
      noise; --grep= applies custom include). Complements the search
      tools for structural/macro context.

  - kind: script
    name: tushare
    cmd: python3 /home/emox/work/projects/market-tools/tushare.py
    hint: >
      Generic REST wrapper for tushare Pro — any api_name can be called.
      Args: `<api_name> [key=value ...] [--fields=a,b,c] [--csv]`. Default
      output is pretty JSON; `--csv` emits header + rows. Auto-retries on
      rate-limit (40203) up to 3× with 35-55s backoff. Bypasses env proxy
      by default (opt-out: TUSHARE_USE_ENV_PROXY=1). Requires TUSHARE_TOKEN.
      Use this for anything the high-level scripts don't cover — index
      members (index_member), industry classification (index_classify),
      SW daily indices (sw_daily), CCTV news (cctv_news), etc. Docs:
      https://tushare.pro/document/2 . Example:
      `python3 /home/emox/work/projects/market-tools/tushare.py daily_basic
       ts_code=600519.SH trade_date=20260430 --fields=pe_ttm,pb,dv_ratio --csv`
    description: >
      Low-level escape hatch into tushare Pro. Stdlib-only Python
      (no pip install). Prefer `history` / `fundamentals` / `policy`
      for common cases.

  - kind: doc
    name: overview
    path: /home/emox/work/projects/market-tools/README.md
    summary: >
      market-tools ships a three-tier market-data floor for finance
      domains. Tier 1 — `quote` (Sina / Stooq, zero deps, no auth,
      snapshot quotes for A-shares / HK / US). Tier 2 — `history` +
      `tushare` (historical OHLCV, raw API access). Tier 3 — analysis
      helpers: `fundamentals` (业绩+估值+预告), `flows` (机构股东+
      北向资金), `policy` (CCTV 新闻联播 政策信号). Tier 3 top:
      `diligence` — 一键运行全部 tier 2/3 工具并输出统一报告,
      末尾 pre-fill 消息/跨市场维度的 search 查询供 agent 接续。
      Ticker shapes unified
      across scripts: sh/sz/hk/bj prefix for CN/HK markets. No pip
      installs anywhere. For news/research context that tushare
      doesn't cover (公告/研报/实时新闻), combine with domain's
      search_baidu (Chinese) / search_tavily (English) / fetch_url
      tools — the investment domain's standard消息面 pipeline.
