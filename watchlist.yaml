# watchlist.yaml — 关注清单 (人工 + agent 协同维护)
#
# 维护约定:
#   - 日常 edit: 直接改本文件 + git commit (加减关注股)
#   - Agent 提议: 周末 cron 把建议写到 watchlist/proposed/YYYY-MM-DD.yaml, 不直接改本文件
#   - 审批应用: 用户在飞书 chat 发"同意 1,2 拒绝 3", agent 解析后调 watchlist_ops.apply_proposal
#   - 每次变更: watchlist_changes.jsonl append 一行 {ts, op, code, ...}
#   - 观察池 size 软约束 ≤ 10 只 (超过时 sunday-preview 优先建议降级/移除)
#
# 注意: 当 agent 调 apply_proposal 修改本文件时, PyYAML safe_dump 会 reformat (保留数据
#       正确, 但丢失本注释和空行). 要保留风格 review 后可切 ruamel.yaml.
#
# ts_code 格式:
#   A 股: "000858.SZ" / "600519.SH" / "831168.BJ"
#   港股: "00700.HK" (5 位数字前补 0)
#
# tier 枚举 (仅标签, 不影响信号逻辑; 信号对所有 tier 用同一套规则):
#   - 基础仓        大市值 + 长期持有
#   - 博弈仓-追涨   主升浪中的强势龙头
#   - 博弈仓-左侧   左侧回调蓄势
#   - 观察池        未买但持续跟踪

