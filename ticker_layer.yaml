# ticker_layer.yaml — 同 narrative 内 ticker 的业务纯度分层
#
# 设计目的:
#   v3 报告发现"蓝思 +34pp 误判": narrative 是 broad/cross_domain/concept (反向信号),
#   但蓝思仍胜出, 因为蓝思在该 narrative 池里业务纯度比同行高.
#   ticker_layer 就是给同一 (subdomain, ticker) 关系打"业务受益纯度"标签,
#   作为 v3 8 维特征之外的第 9 维 (ticker-level, 而非 event-level).
#
# layer 定义:
#   core_pure        — 业务 80%+ 直接受益于该 narrative; 该 narrative 几乎是 ticker 的 100% 估值锚
#   core_partial     — 主营业务相关但 30-80% 受益; 该 narrative 是公司多个驱动之一
#   satellite        — 副业/产业链外围; 该 narrative 是次要业务驱动 (<30%) 但有真实曝险
#   concept_only     — 仅概念关联; 该 narrative 在公司业务里无实质曝险, 涨幅靠情绪
#
# 用法:
#   narrative_track.py 给 perf 行加 ticker_layer 字段
#   narrative_radar_review.py 加 ticker_layer 维度的 cross-tab
#   预期: core_pure 远胜 satellite, satellite 远胜 concept_only — 验证假设 4
#
# 维护:
#   新增 (subdomain, ticker) 时手工添加; 业务边界变化时重审 (e.g. 蓝思 AI 业务占比上升, 从 satellite → core_partial)
#
# Last updated: 2026-05-31

# 格式: subdomain → {ticker_code: layer}
# layer ∈ {core_pure, core_partial, satellite, concept_only}

