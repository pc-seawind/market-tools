# concept_etf_map.yaml — 概念板块 ETF 映射表 (v2: 扩展到 31 主题)
#
# 目的: 用 ETF 数据 (份额 + 净值) 算板块级资金面/技术面, 比 concepts_data.py
#       的成分股均值更 canonical (ETF 份额变动 = 机构+散户共识资金流向).
#
# 数据来源:
#   - tushare fund_share  (每日 ETF 份额, 单位: 万份)
#   - tushare fund_daily  (每日 ETF OHLCV 净值)
#   - tushare fund_basic  (ETF 元数据)
#
# 板块资金净流入 (CNY) = (fd_share[today] - fd_share[yesterday]) × nav[today] × 10000
#
# 数据质量标签 (data_quality):
#   direct   — 有独立主题 ETF, 数据最准
#   proxy    — 用父级 ETF 代理 (精度打折, 仍优于 concept 成分股均值)
#   fallback — 无合适 ETF, 退回到 concepts_data.py 成分股平均
#
# 多 ETF 混合: 若一个 concept 映射到多只 ETF, 按 weight 加权混合
#              (weight 之和应接近 1.0, 可用来降噪 + 扩大覆盖)
#
# 维护:
#   - 新 concept 加入时, 先搜 tushare fund_basic 看是否有对应主题 ETF
#   - 规模 < 3000 万日成交的 ETF 不做主映射 (流动性不足)
#   - share_date 长期未更新的 ETF (如某些 LOF) 要降级或剔除
#   - 每 3-6 个月 review 映射是否仍代表主题 (如主题演化 / 新 ETF 发行)

