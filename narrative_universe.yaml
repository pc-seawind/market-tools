# narrative_universe.yaml — 叙事层覆盖范围 (AI / 家居 / 交叉)
#
# 设计目的:
#   叙事雷达 (narrative_radar.py) 每日扫多源, LLM 二级筛"叙事级别"事件后,
#   要快速回答"这条新闻能影响哪些 A 股标的".
#   本文件就是事件 → 板块 → 个股 的查找表.
#
# 字段:
#   - track:           AI / 家居 / AI×家居 (跨界, 优先级最高)
#   - keywords:        radar 搜索关键词 (中英文都加, 中文用 search_baidu, 英文用 search_tavily)
#   - tickers:         代表性 A 股标的 (5-10 只, 优先权重高的)
#   - source_concepts: 在 concept_etf_map.yaml 里对应的 concept name (用于 backref)
#   - rationale:       为啥纳入这个轨道, 1 行
#
# 维护: 当出现新故事 (如 DeepSeek 流派 / Apple AI 链) 时, 在对应 track 下加新 sub-domain.
#
# 数据 owner: emox / homespace / market-tools

schema_version: 2
last_updated: 2026-05-25
total_tracks: 28

# ═══════════════════════════════════════════════════════════════════════════
# 末期抱团 sub_domain — narrative_radar 收事件时给这里列出的 subdomain 自动打
# late_stage=true, 下游 narrative_track / picker 据此降权 (score_penalty +1).
#
# 加入条件 (任一满足):
#   1) 该 sub_domain 的 sector_score Tier 已沦落到 "末期抱团" (sector_picks 标记)
#   2) narrative_track 周报里该 sub_domain 的 hit_rate < 40% 且事件数 ≥ 5 条
#   3) 板块 ETF 资金净流出连续 5 个交易日 (concept_etf_map 数据)
#
# 移除条件: 板块出现 -15% 调整后再放回 — 别在抱团末期反复出入
#
# 决策证据: W21 v3 doc - ai__compute_chip 23 events / 30.4% hit / 0% median excess
# (2026-05-25 emox)
# ═══════════════════════════════════════════════════════════════════════════
late_stage_subdomains:
  - ai__compute_chip   # 国产算力 — 寒武纪/华海清科/海光在 D30 都 -5%~-7%, 5/24 W21 验证

# ═══════════════════════════════════════════════════════════════════════════
# event_type 分类器关键词 — narrative_radar.cmd_add 会把 title+rationale+thesis_seed
# 拼起来匹配下面的关键词, 第一匹配命中就贴 event_type 标签.
#
# trailing_data / recap_news 类的 event 会被 score_penalty +1 (因为是 lagging
# 数据, 市场已经 price-in 在前期股价里), 下游 picker 降权.
#
# 顺序非常重要 — 越靠前优先级越高 (capex_lock 比 govt_policy 优先, 因为前者更具体).
# ═══════════════════════════════════════════════════════════════════════════
event_type_patterns:
  # 实业增量类 (最强信号 — 不扣分)
  capex_lock:
    keywords:
      - capex
      - 新厂
      - 新工厂
      - 扩产
      - 上调
      - 中标
      - 量产
      - 投产
      - 签约
      - 收购
      - 入股
      - 供货合同
      - 战略合作
    rationale: "实业增量锁定 — 未来 N 个季度营收必然增加, 最高质量信号 (W21 v3 §5)"
    score_penalty: 0

  quant_increment:
    keywords:
      - 涨价
      - 价值量
      - 单价
      - ASP
      - 毛利率
      - 单机柜
      - 价格上涨
      - 缺货
      - 短缺
      - 提价
    rationale: "量化增量 — 数字明确驱动估值, 仅次于 capex_lock"
    score_penalty: 0

  # 政策类 (中性)
  govt_policy:
    keywords:
      - 国标
      - 补贴
      - 以旧换新
      - 政策
      - 国务院
      - 工信部
      - 发改委
      - 财政部
      - 央行
      - 推进
      - 试点
    rationale: "政策驱动 — 落地节奏不确定, 标的弹性差异大, 不扣分但也不加分"
    score_penalty: 0

  # 滞后信息类 (扣分)
  recap_news:
    keywords:
      - 研报
      - 评级
      - 目标价
      - 分析师
      - 卖方
      - 增持
      - 买入评级
      - 首予
      - 给予
      - 上调评级
    rationale: "卖方研报 — lagging indicator, 机构内部已看完才发外部, 等你看到时已 price in"
    score_penalty: 1

  trailing_data:
    keywords:
      - 销量第一
      - 市占率第一
      - 排名第一
      - 销量同比
      - 出货量同比
      - 市占率达
      - 业绩超预期
      - 历史新高
      - 创历史
      - 半年报
      - 年报披露
    rationale: "回顾型数据 — 已发生事实, 已 price in 在过去半年股价里"
    score_penalty: 1


