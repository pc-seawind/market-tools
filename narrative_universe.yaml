# ═══════════════════════════════════════════════════════════════════════════
# 实时快讯流 (分钟级一手源, radar 用 fetch_url_rendered 拿原文 → cls_telegraph_filter 过滤)
#   workflow: agent fetch_url_rendered(url) → echo 原文 | python3 cls_telegraph_filter.py
#             --source <source> → 候选 JSON → 对 relevance≥阈值 且 dedup_status=='new'
#             的逐条评分 → narrative_radar.py add 入库
#   filter:   cls_telegraph_filter.py (多源: cls/eastmoney/sina, 共享 universe 过滤 + 30天指纹去重)
# ═══════════════════════════════════════════════════════════════════════════
realtime_feeds:
  filter_script: "cls_telegraph_filter.py"
  feeds:
    - source: cls
      url: "https://www.cls.cn/telegraph"
      name: "财联社电报"
      fetch: rendered      # SPA, 需 fetch_url_rendered
      note: "A股一手快讯主源, 自带 stock 标签 → 强 ticker 命中"
    - source: eastmoney
      url: "https://kuaixun.eastmoney.com/"
      name: "东财快讯"
      fetch: rendered
      note: "东方财富快讯, 与 cls 互补; markdown 解析"
    - source: sina
      url: "https://zhibo.sina.com.cn/api/zhibo/feed?page=1&page_size=30&zhibo_id=152&tag_id=0&type=0"
      name: "新浪7x24"
      fetch: direct        # JSON API, fetch_url 即可
      note: "JSON feed, stocks 字段自带 ticker. zhibo_id=152 是宏观/国际版面噪音多; A股公司快讯应换 zhibo_id (tuning item: 找证券/A股财经直播 id)"

