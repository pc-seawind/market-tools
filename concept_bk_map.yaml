# concept_bk_map.yaml — 概念板块 → 东财 BK (行业/概念) 映射
#
# 用途: sector_score v3.fund_flow_score 用 BK moneyflow_ind_dc 大单/超大单数据
#       替代失效的 ETF share-flow 信号 (回测确认 r=-0.07 反向).
#
# 数据源: tushare moneyflow_ind_dc — 包含 buy_elg_amount (超大单) +
#         buy_lg_amount (大单) + buy_sm_amount (散户) + net_amount_rate (净流入率%).
#
# 设计:
#   - 每个 concept 映射到 1-3 个 BK 码 (优先行业 + 1 个最对口的概念)
#   - 多 BK 时 main_minus_sm_20d / rate_20d 取均值 (粗糙但稳定)
#   - 数据深度: 行业 BK 通常 ≥ 1.5y; 概念 BK 大多 9 个月起
#   - 板块跨多个 BK 时, 选 sub_domain 最匹配的, 不要叠太多 (噪音放大)
#
# 验证: backtest_elastic_net.py 在 7 个 AI BK 上跑 n=2603 多元回归,
#       main_minus_sm_20d r=+0.22, rate_20d r=+0.10, ETF share r=-0.07.
#
# 维护:
#   - 新 concept 加入时, 用 `python3 tushare.py moneyflow_ind_dc trade_date=YYYYMMDD`
#     列出全部 BK + name, 找最匹配的
#   - 若 concept 过窄无对应 BK, status: pending → fund_flow_score 走 NEUTRAL fallback
#   - kind: industry (BK10xx-12xx) 数据最深; concept (BK0xxx-09xx) 9 个月起
#     industry+concept 混用比纯 concept 稳, 但单 industry 也行

schema_version: 1
last_updated: 2026-05-25

# ═══════════ Dup Groups (2026-05-25 audit) ═══════════
# 这些 group 内的 concept 共用同一组 BK 数据源, 因此 sector_score 的
# fund_flow_pts 在组内 100% 相同. 区分只在 fundamentals_pts (各自成分股
# 中位数 ROE/YoY) 和 technical_pts (各自 ETF 组合的 nav). sector_score
# 排名时应该感知 dup_group, 同组多 concept 上榜要打 "(同组)" 标识.
#
# parent_of: 父子关系, 父 concept 的 ETF 包含子 concept (如新能源 ⊃ 光伏)
# 子 concept 在 sector_score top-N 时应让位给父 (避免双计).
dup_groups:
  semi_subindex:  # 半导体 5 细分: BK 全等于 [BK1036], 股池差异化
    members:
      - "AI芯片 (算力核心)"        # AI芯片 = [BK1036 + BK0917], 多一个概念 BK
      - "存储芯片 (HBM/DDR/NAND)"
      - "先进封装 (CoWoS/Chiplet)"
      - "硅片 (半导体材料)"
      - "半导体设备 (国产替代)"
    note: "fund_flow 共用 BK1036 (AI芯片额外加 BK0917), 区分主要靠基本面 + 各自股池. sector_picks 子领域龙头股不重叠 (Jaccard 0-23%), 选股层面有意义."
  nv_hw_link:     # 英伟达 vs 华为: BK 完全相同, 股池 0% 重叠
    members:
      - "英伟达产业链"
      - "华为产业链"
    note: "BK 都是 [BK1036+BK0448]. 卖点 (下游客户) 不同, 股池 0% 重叠. fund_flow 无法区分, sector_picks 可以."

parent_concepts:  # 父 concept ⊃ 子 concept (子被父的 ETF/BK 包含)
  "新能源 (光伏/风电)":
    children: ["光伏"]
    note: "新能源(光伏/风电) primary_etfs 含 515790 光伏 ETF (weight 0.3). 子父同时排名 = 双计."

concepts:

